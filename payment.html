<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - HamroPasal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container header-flex">
        <div class="logo-container">
            <img src="images/logo.png" alt="HamroPasal Logo" class="logo-img">
            <h1 class="logo-text">HamroPasal</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="cart.html">My Cart</a></li>
                <li><a href="profile.html" class="profile-link">Profile</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="page-banner">
    <div class="container">
        <h2>Payment</h2>
        <p>This is a front-end payment page demo.</p>
    </div>
</section>

<section class="section">
    <div class="container payment-layout">
        <div class="contact-form">
            <h2>Payment Details</h2>
            <form action="#" method="post">
                <input type="text" placeholder="Name on Card" required>
                <input type="text" placeholder="Card Number" required>
                <input type="text" placeholder="Expiry Date" required>
                <input type="text" placeholder="CVV" required>
                <button type="submit" class="btn">Pay Now</button>
            </form>
        </div>

        <div class="cart-summary">
            <h3>Order Total</h3>
            <p>Product: $69.99</p>
            <p>Delivery: $9.99</p>
            <h3>Total: $79.98</h3>
        </div>
    </div>
</section>

<footer>
    <div class="container">
        <p>email: support@hamropasal.com phone: +61 412 345 678</p>
    </div>
</footer>

</body>
</html>
